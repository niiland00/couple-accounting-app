<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Couple Accounting</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#FF8C00">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="apple-touch-icon" href="/static/icon.png">
</head>
<body>

<div class="container">
    <h1>Couple Accounting</h1>

    <div id="id-section" class="input-card">
        <h3>歡迎使用，請輸入你們的ID</h3>
        <p style="font-size: 0.8rem; color: #888;">輸入專屬 ID 以同步彼此的紀錄</p>
        <div class="input-group">
            <input id="couple-id-input" placeholder="例如: SEANBABBY520">
        </div>
        <button class="primary-btn" onclick="saveCoupleID()">開始記帳</button>
    </div>

    <div id="main-app" style="display: none;">
        <div class="status-bar">
            <span>當前 ID: <strong id="display-id"></strong></span>
            <button class="text-btn" onclick="resetID()">重設</button>
        </div>

        <div class="input-card">
            <div class="input-group">
                <input id="item" placeholder="項目">
                <input id="desc" placeholder="描述">
                <input id="price" type="number" inputmode="decimal" placeholder="金額">
                <input id="payer" placeholder="要叫誰爸爸">
                <input id="date" type="date">
            </div>
            <button class="primary-btn" onclick="addRecord()">新增一筆</button>
        </div>

        <div class="list-section">
            <div id="list-view">
                <div class="list-header">
					<h2 class="split-title">記帳<br>紀錄</h2> <div class="search-bar">
					<input type="date" id="searchDate"><br></br>
					<button class="secondary-btn" onclick="search()">🔍</button>
					</div>
				</div>
                <div id="records" class="records-grid"></div>
            </div>

            <div id="detail-view" style="display: none;">
                <div class="list-header">
                    <button class="text-btn" onclick="backToList()" style="color: #FF8C00; font-size: 1rem; font-weight: bold;">← 返回列表</button>
                    <h2>描述</h2>
                </div>
                <div id="detail-content" class="record-card" style="background: white; cursor: default; display: block;">
                    </div>
            </div>
        </div>
    </div>
</div>

<script src="/static/app.js"></script>
<script>
// 預設日期為今天
document.getElementById('date').valueAsDate = new Date();

if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("/service-worker.js") 
    .then(() => console.log("Service Worker Registered"))
    .catch(err => console.log("Service Worker 註冊失敗", err));
}
</script>

</body>
</html>
