<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Couple Accounting</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#ff6b81">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="apple-touch-icon" href="/static/icon.png">
</head>

<body>

<div class="container">
        <h1></h1>

		<div class="input-card">
            <div class="input-group">
                <input id="item" placeholder="項目">
                <input id="desc" placeholder="描述">
                <input id="price" type="number" placeholder="金額">
                <input id="payer" placeholder="付款人">
                <input id="date" type="date">
            </div>
            <button class="primary-btn" onclick="addRecord()">新增一筆</button>
        </div>

		<div class="list-section">
            <h2>記帳紀錄</h2>
            <div class="search-bar">
                <input type="date" id="searchDate">
                <button class="secondary-btn" onclick="search()">查詢</button>
            </div>
            <ul id="records"></ul>
        </div>
</div>

<script src="/static/app.js"></script>
<script>
if ("serviceWorker" in navigator) {
  // 注意：這裡改為指向我們在 app.py 設定的路由
  navigator.serviceWorker.register("/service-worker.js") 
    .then(() => console.log("Service Worker Registered"))
	.catch(err => console.log("Service Worker 註冊失敗", err));
}
</script>

</body>
</html>
