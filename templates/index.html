<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Couple Accounting</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#FF8C00">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="apple-touch-icon" href="/static/icon.png">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
<div class="bg-layer">
        <div class="bg-normal"></div>
        <div class="bg-flipped"></div>
    </div>

<div class="container">
    <h1>Couple Accounting</h1>

    <div id="id-section" class="input-card">
        <h3>歡迎使用，請輸入你們的ID</h3>
        <p style="font-size: 0.8rem; color: #888;">輸入專屬 ID 以同步彼此的紀錄</p>
        <div class="input-group">
            <input id="couple-id-input" placeholder="例如: SEANBABBY520">
        </div>
        <button class="primary-btn" onclick="saveCoupleID()">開始記帳</button>
    </div>

    <div id="main-app" style="display: none;">
    <div class="status-bar">
        <span>當前 ID: <strong id="display-id"></strong></span>
        <button class="text-btn" onclick="resetID()">重設</button>
    </div>

    <div class="input-card">
        <div class="input-group">
            <input id="item" placeholder="項目">
            <input id="desc" placeholder="描述">
            <input id="price" type="number" inputmode="decimal" placeholder="金額">
            <input id="payer" placeholder="要叫誰爸爸">
            <input id="date" type="date">
        </div>
        <button class="primary-btn" onclick="addRecord()">新增一筆</button>
    </div>

    <div class="list-section">
        <div id="list-view">
            <h2 class="section-title">記帳紀錄</h2>
            
            <div class="search-bar-full">
                <input type="date" id="searchDate">
                <button class="secondary-btn" onclick="search()">🔍 搜尋</button>
            </div>

            <div class="month-seletor">
                <button class="text-btn" onclick="changeMonth(-1)">◀</button>
                <span id="current-month-display">2024年 03月</span>
                <button class="text-btn" onclick="changeMonth(1)">▶</button>
            </div>

            <div id="records" class="records-grid"></div>
            
            <div style="text-align: right; margin-top: 20px;">
                <button class="primary-btn" onclick="showStats()">本月大比拚 ❯</button>
            </div>
        </div>

        <div id="detail-view" style="display: none;">
            <div class="list-header">
                <button class="text-btn" onclick="backToList()" style="color: #FF8C00; font-size: 1rem; font-weight: bold;">← 返回列表</button>
                <h2>描述</h2>
            </div>
            <div id="detail-content" class="record-card" style="background: white; cursor: default; display: block;"></div>
        </div>

        <div id="stats-view" style="display: none;">
            <div class="list-header">
                <button class="text-btn" onclick="backToList()" style="color: #FF8C00; font-size: 1rem; font-weight: bold;">← 返回列表</button>
                <h2 class="split-title">本月大比拚</h2>
            </div>
            <div class="input-card" style="background: white;">
                <canvas id="payerChart"></canvas>
                <div id="stats-summary" style="margin-top: 20px; text-align: center; color: #666; font-weight: bold;"></div>
            </div>
        </div>
    </div>

    <div class="input-card">
    <div class="feature-item">
        <h3 style="margin-top:0; color:#E65100;">💰 存錢目標</h3>
        <button class="primary-btn disabled-style">***功能開發中***</button>
    </div>
    
    <hr style="border: 0; border-top: 1px dashed #ddd; margin: 20px 0;">

    <div class="feature-item">
        <h3 style="margin-top:0; color:#E65100;">📅 紀念日倒數</h3>
        <div class="input-group" style="margin-bottom: 10px;">
            <input id="anni-title" placeholder="紀念日名稱">
            <input id="anni-date" type="date">
            <button class="primary-btn" onclick="addAnniversary()" style="padding: 10px;">新增紀念日</button>
        </div>
        <div id="anniversary-list" style="margin-top: 15px;">
            </div>
    </div>
	</div>
	</div><script src="/static/app.js"></script>
<script>
// 預設日期為今天
document.getElementById('date').valueAsDate = new Date();

if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("/service-worker.js") 
    .then(() => console.log("Service Worker Registered"))
    .catch(err => console.log("Service Worker 註冊失敗", err));
}
</script>

</body>
</html>
